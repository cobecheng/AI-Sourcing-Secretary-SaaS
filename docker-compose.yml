services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_sourcing
      POSTGRES_PASSWORD: ai_sourcing_password
      POSTGRES_DB: ai_sourcing
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://ai_sourcing:ai_sourcing_password@postgres:5432/ai_sourcing
      REDIS_URL: redis://redis:6379/0
      MOCK_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_MOCK_MODE: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:

